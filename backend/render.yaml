services:
  - type: web
    name: chocoberry-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: chocoberry-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: chocoberry_super_secret_change_in_prod_2026
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: DEFAULT_CURRENCY
        value: "TJS"
      - key: DEFAULT_LANGUAGE
        value: "tg"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: chocoberry_tjk_bot

databases:
  - name: chocoberry-db
    plan: free
